<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perceptual Web</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      background: #0f0f10;
      color: #e8e8ea;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #2a2a2e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #f0f0f2;
    }

    header .badge {
      font-size: 10px;
      font-weight: 600;
      background: #6c3bff22;
      color: #a47bff;
      border: 1px solid #6c3bff55;
      border-radius: 4px;
      padding: 1px 5px;
      letter-spacing: 0.04em;
    }

    #status-bar {
      padding: 8px 16px;
      font-size: 12px;
      color: #888;
      border-bottom: 1px solid #1e1e22;
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-bar .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #888;
      flex-shrink: 0;
    }

    #status-bar.connected .dot { background: #4ade80; }
    #status-bar.connected { color: #4ade80; }
    #status-bar.error .dot { background: #f87171; }
    #status-bar.error { color: #f87171; }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #1e1e22;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #page-title-value {
      font-size: 13px;
      color: #c8c8cc;
      word-break: break-word;
      line-height: 1.4;
    }

    #page-title-value.empty { color: #444; font-style: italic; }

    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      font-size: 13px;
      font-family: inherit;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid #3a3a3e;
      background: #1e1e22;
      color: #c8c8cc;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }

    button:hover { background: #2a2a2e; border-color: #555; }
    button:active { background: #313136; }

    button.primary {
      background: #6c3bff;
      border-color: #6c3bff;
      color: #fff;
      font-weight: 500;
    }
    button.primary:hover { background: #7d52ff; border-color: #7d52ff; }

    #extract-output {
      font-size: 11px;
      font-family: "SF Mono", "Fira Mono", monospace;
      background: #0a0a0c;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      padding: 10px 12px;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: #8ab4f8;
      line-height: 1.5;
      margin-top: 10px;
    }

    #extract-output.empty { color: #444; font-style: italic; }

    #proxy-log {
      font-size: 11px;
      font-family: "SF Mono", "Fira Mono", monospace;
      color: #4ade80;
      background: #0a0a0c;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      padding: 8px 12px;
      max-height: 120px;
      overflow-y: auto;
      margin-top: 10px;
      line-height: 1.6;
    }

    #proxy-log.empty { color: #444; font-style: italic; }

    #agent-surface {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #333;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Perceptual Web</h1>
    <span class="badge">BUILDER B TEST PANEL</span>
  </header>

  <div id="status-bar">
    <span class="dot"></span>
    <span id="status-text">Waiting for page...</span>
  </div>

  <!-- TEST B1 — Page title -->
  <div class="section">
    <div class="section-label">Page (TEST B1)</div>
    <div id="page-title-value" class="empty">not yet received</div>
  </div>

  <!-- TEST B2 — Extraction -->
  <div class="section">
    <div class="section-label">Extraction (TEST B2)</div>
    <div class="action-row">
      <button id="btn-extract" class="primary">Extract Page</button>
      <button id="btn-clear-extract">Clear</button>
    </div>
    <div id="extract-output" class="empty">Press Extract Page to see ExtractedPage JSON</div>
  </div>

  <!-- TEST B3 — Proxy -->
  <div class="section">
    <div class="section-label">Proxy events (TEST B3)</div>
    <div class="action-row">
      <input id="proxy-ref" type="text" placeholder="sourceRef e.g. pw-5"
             style="flex:1;font-size:13px;padding:7px 10px;border-radius:6px;
                    border:1px solid #3a3a3e;background:#1e1e22;color:#c8c8cc;
                    font-family:inherit;min-width:0;" />
      <select id="proxy-action"
              style="font-size:13px;padding:7px 10px;border-radius:6px;
                     border:1px solid #3a3a3e;background:#1e1e22;color:#c8c8cc;
                     font-family:inherit;">
        <option value="click">click</option>
        <option value="navigate">navigate</option>
        <option value="input">input</option>
        <option value="submit">submit</option>
      </select>
      <button id="btn-proxy" class="primary">Send</button>
    </div>
    <input id="proxy-value" type="text" placeholder="value (for input action)"
           style="margin-top:6px;width:100%;font-size:13px;padding:7px 10px;
                  border-radius:6px;border:1px solid #3a3a3e;background:#1e1e22;
                  color:#c8c8cc;font-family:inherit;" />
    <div id="proxy-log" class="empty">Proxy acks will appear here</div>
  </div>

  <div id="agent-surface">Agent surface renders here in Phase 4</div>

  <script src="panel.js"></script>
</body>
</html>
